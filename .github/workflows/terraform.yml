###############################################################
# .github/workflows/terraform.yml
# Author: Yusdel Concepcion
# Description: Full CI/CD Pipeline for Terraform AWS Infrastructure
#
# Triggers:
#   - Pull Request  → fmt, validate, plan (no costs)
#   - Push to main  → apply (deploys infrastructure)
#   - Manual        → destroy (cleanup on demand)
###############################################################

name: Terraform CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "Select action to run"
        required: true
        default: "destroy"
        type: choice
        options:
          - destroy
permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  TF_VERSION: "1.10.3"
  AWS_REGION: "sa-east-1"
  TF_VAR_FILE: "environments/dev/terraform.tfvars"

jobs:
  ###############################################################
  # JOB 1: Terraform Format & Validate
  # Runs on: Pull Request
  ###############################################################
  validate:
    name: "🔍 Validate"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### 🔍 Terraform Validation Results
            | Step | Result |
            |------|--------|
            | Format | ${{ steps.fmt.outcome == 'success' && '✅ Passed' || '⚠️ Issues found' }} |
            | Init   | ${{ steps.init.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |
            | Validate | ${{ steps.validate.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |
            
            *Pushed by: @${{ github.actor }} | Workflow: ${{ github.workflow }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  ###############################################################
  # JOB 2: Terraform Plan
  # Runs on: Pull Request
  ###############################################################
  plan:
    name: "📋 Plan"
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="db_username=${{ secrets.TF_VAR_DB_USERNAME }}" \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -no-color -out=tfplan
        continue-on-error: true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### 📋 Terraform Plan Results
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            **Plan Status:** ${{ steps.plan.outcome == 'success' && '✅ Success' || '❌ Failed' }}
            
            *Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  ###############################################################
  # JOB 3: Terraform Apply
  # Runs on: Push to main
  ###############################################################
  apply:
    name: "🚀 Apply"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="db_username=${{ secrets.TF_VAR_DB_USERNAME }}" \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -no-color -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Show Outputs
        run: terraform output

  ###############################################################
  # JOB 4: Terraform Destroy
  # Runs on: Manual trigger only
  ###############################################################
  destroy:
    name: "💣 Destroy"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="db_username=${{ secrets.TF_VAR_DB_USERNAME }}" \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -auto-approve
